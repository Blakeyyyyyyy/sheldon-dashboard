<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheldon — AI Factory Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #7a7a8a;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--accent); }

  .header-meta {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  .status-dot.active { background: var(--green); }
  .status-dot.idle { background: var(--text-dim); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* --- Metrics Row --- */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  .metric-value {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .metric-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .metric-value.green { color: var(--green); }
  .metric-value.yellow { color: var(--yellow); }
  .metric-value.red { color: var(--red); }
  .metric-value.accent { color: var(--accent); }

  /* --- Main Grid --- */
  .grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 24px;
  }

  /* --- Section --- */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  .badge.green { background: rgba(34, 197, 94, 0.15); color: var(--green); }
  .badge.yellow { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
  .badge.red { background: rgba(239, 68, 68, 0.15); color: var(--red); }
  .badge.accent { background: var(--accent-glow); color: var(--accent); }

  /* --- Project Card --- */
  .project-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .project-card:hover { border-color: var(--accent); }

  .project-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .project-name {
    font-size: 16px;
    font-weight: 600;
  }

  .project-phase {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 6px;
    background: var(--accent-glow);
    color: var(--accent);
    font-weight: 500;
  }

  .project-phase.build { background: rgba(99, 102, 241, 0.15); color: var(--accent); }
  .project-phase.review { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
  .project-phase.deploy { background: rgba(34, 197, 94, 0.15); color: var(--green); }
  .project-phase.flagged { background: rgba(239, 68, 68, 0.15); color: var(--red); }

  /* Progress Bar */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    transition: width 0.5s ease;
  }

  .project-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
  }

  .score {
    font-weight: 600;
  }

  .score.high { color: var(--green); }
  .score.mid { color: var(--yellow); }
  .score.low { color: var(--red); }

  /* --- Idea Card --- */
  .idea-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .idea-card:hover { border-color: var(--accent); }

  .idea-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .idea-name { font-size: 14px; font-weight: 600; }

  .idea-score {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .idea-tagline {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .idea-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* --- Activity Feed --- */
  .feed-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .feed-item:last-child { border-bottom: none; }

  .feed-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .feed-text { line-height: 1.4; }

  /* --- Flags --- */
  .flag-item {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .flag-item.warning {
    background: rgba(234, 179, 8, 0.08);
    border-color: rgba(234, 179, 8, 0.2);
  }

  /* --- Empty State --- */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* --- Refresh --- */
  .refresh-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.2s;
  }

  .refresh-btn:hover { background: var(--accent-glow); border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Sheldon</span> — AI Factory</h1>
  <div class="header-meta">
    <span><span class="status-dot active" id="statusDot"></span> <span id="statusText">Running</span></span>
    <span id="lastUpdate">Last update: --</span>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
</div>

<div class="metrics">
  <div class="metric-card">
    <div class="metric-value accent" id="metricBuilding">0</div>
    <div class="metric-label">Building</div>
  </div>
  <div class="metric-card">
    <div class="metric-value green" id="metricShipped">0</div>
    <div class="metric-label">Shipped</div>
  </div>
  <div class="metric-card">
    <div class="metric-value" id="metricQueued">0</div>
    <div class="metric-label">Ideas Queued</div>
  </div>
  <div class="metric-card">
    <div class="metric-value red" id="metricFlags">0</div>
    <div class="metric-label">Needs Attention</div>
  </div>
</div>

<div class="grid">
  <div class="left">
    <!-- Active Projects -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Active Projects</span>
        <span class="badge accent" id="activeCount">0 / 3</span>
      </div>
      <div id="projectsList">
        <div class="empty">No active projects. Approve an idea to get started.</div>
      </div>
    </div>

    <!-- Idea Queue -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Idea Queue</span>
        <span class="badge green" id="ideaCount">0</span>
      </div>
      <div id="ideasList">
        <div class="empty">Monday research hasn't run yet. Ideas will appear here.</div>
      </div>
    </div>
  </div>

  <div class="right">
    <!-- Flags -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Needs Attention</span>
      </div>
      <div id="flagsList">
        <div class="empty" style="padding: 20px;">All clear</div>
      </div>
    </div>

    <!-- Activity Feed -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Activity Feed</span>
      </div>
      <div id="activityFeed">
        <div class="empty" style="padding: 20px;">No activity yet</div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// Dashboard Data Loading
// ============================================================================
// This dashboard reads state files from the factory's state/ directory.
// In production, a small Python/Node server serves the JSON files.
// For now, it works with the demo data below.
//
// To connect to live data:
// 1. Run: python3 -m http.server 8080 --directory ~/.openclaw/workspace/state
// 2. Update BACKEND_URL below
// ============================================================================

const BACKEND_URL = 'http://localhost:8080';
const DEMO_MODE = true; // Set to false when backend server is running

// Phase progress percentages
const PHASE_PROGRESS = {
  'ideation': 10,
  'validation': 20,
  'build': 45,
  'review': 65,
  'monetize': 75,
  'deploy': 90,
  'submit': 95,
  'completed': 100
};

// Phase display classes
const PHASE_CLASS = {
  'build': 'build',
  'review': 'review',
  'deploy': 'deploy',
  'monetize': 'build',
  'submit': 'deploy',
  'flagged': 'flagged'
};

// --- Demo Data ---
const DEMO_PROJECTS = [
  {
    slug: 'dance-ai',
    name: 'Dance AI',
    phase: 'build',
    phase_status: 'in_progress',
    last_updated: new Date().toISOString(),
    scores: { validation: 9.2, review: null },
    notes: 'Builder agent working on core video processing'
  }
];

const DEMO_IDEAS = [
  {
    name: 'AI Dating Profile Coach',
    slug: 'ai-dating-coach',
    tagline: 'Upload your dating profile. AI tells you exactly what to fix.',
    cal_ai_score: 6,
    validation_score: 9.2,
    verdict: 'BUILD',
    category: 'Lifestyle / Dating',
    build_estimate: '2 weeks',
    approved: false
  },
  {
    name: 'AI Body Progress Tracker',
    slug: 'ai-body-tracker',
    tagline: 'Photo-based body transformation tracking. No scale needed.',
    cal_ai_score: 6,
    validation_score: 8.8,
    verdict: 'BUILD',
    category: 'Health & Fitness',
    build_estimate: '3 weeks',
    approved: false
  },
  {
    name: 'AI Fridge Meal Planner',
    slug: 'ai-fridge-meals',
    tagline: 'Photo your fridge. Get meals from what you already have.',
    cal_ai_score: 5,
    validation_score: 8.1,
    verdict: 'BUILD',
    category: 'Food & Drink',
    build_estimate: '3 weeks',
    approved: false
  }
];

const DEMO_FLAGS = [];

const DEMO_ACTIVITY = [
  { time: '08:00', text: 'Factory loop started. 1 active project.' },
  { time: '07:02', text: 'Monday research completed. 3 ideas added to queue.' },
  { time: '07:00', text: 'Research agent spawned (Grok). Scanning markets...' }
];

// --- Render Functions ---

function renderProject(project) {
  const progress = PHASE_PROGRESS[project.phase] || 0;
  const phaseClass = PHASE_CLASS[project.phase] || 'build';
  const score = project.scores?.review;
  const scoreClass = score >= 8 ? 'high' : score >= 6 ? 'mid' : score ? 'low' : '';
  const scoreText = score ? `${score}/10` : '--';
  const updated = project.last_updated ? new Date(project.last_updated).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}) : '--';

  return `
    <div class="project-card">
      <div class="project-top">
        <span class="project-name">${project.name}</span>
        <span class="project-phase ${phaseClass}">${project.phase.toUpperCase()}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
      <div class="project-meta">
        <span>Updated: ${updated}</span>
        <span>Quality: <span class="score ${scoreClass}">${scoreText}</span></span>
        <span>${project.phase_status || 'pending'}</span>
      </div>
    </div>
  `;
}

function renderIdea(idea) {
  const scoreColor = idea.validation_score >= 8 ? 'green' : idea.validation_score >= 6 ? 'yellow' : 'red';
  return `
    <div class="idea-card">
      <div class="idea-top">
        <span class="idea-name">${idea.name}</span>
        <span class="idea-score badge ${scoreColor}">${idea.validation_score}/10</span>
      </div>
      <div class="idea-tagline">${idea.tagline}</div>
      <div class="idea-meta">
        <span>Cal AI: ${idea.cal_ai_score}/6</span>
        <span>${idea.category}</span>
        <span>${idea.build_estimate}</span>
        <span class="badge ${idea.approved ? 'green' : 'accent'}">${idea.approved ? 'APPROVED' : idea.verdict}</span>
      </div>
    </div>
  `;
}

function renderFlag(flag) {
  const cls = flag.type === 'critical' ? '' : 'warning';
  return `<div class="flag-item ${cls}">${flag.text}</div>`;
}

function renderActivity(item) {
  return `
    <div class="feed-item">
      <div class="feed-time">${item.time}</div>
      <div class="feed-text">${item.text}</div>
    </div>
  `;
}

// --- Load & Render ---

async function loadData() {
  let projects, ideas, flags, activity;

  if (DEMO_MODE) {
    projects = DEMO_PROJECTS;
    ideas = DEMO_IDEAS;
    flags = DEMO_FLAGS;
    activity = DEMO_ACTIVITY;
  } else {
    try {
      const [projRes, ideasRes] = await Promise.all([
        fetch(`${BACKEND_URL}/active/`).then(r => r.json()).catch(() => []),
        fetch(`${BACKEND_URL}/ideas/`).then(r => r.json()).catch(() => [])
      ]);
      projects = projRes;
      ideas = ideasRes;
      flags = [];
      activity = [];
    } catch (e) {
      console.error('Failed to load data:', e);
      return;
    }
  }

  // Update metrics
  const building = projects.filter(p => ['build', 'review', 'monetize', 'deploy'].includes(p.phase)).length;
  const shipped = projects.filter(p => p.phase === 'completed').length;
  const flagCount = flags.length + projects.filter(p => p.phase === 'flagged').length;

  document.getElementById('metricBuilding').textContent = building;
  document.getElementById('metricShipped').textContent = shipped;
  document.getElementById('metricQueued').textContent = ideas.filter(i => !i.approved).length;
  document.getElementById('metricFlags').textContent = flagCount;
  document.getElementById('activeCount').textContent = `${projects.length} / 3`;
  document.getElementById('ideaCount').textContent = ideas.length;

  // Render projects
  const projectsEl = document.getElementById('projectsList');
  if (projects.length > 0) {
    projectsEl.innerHTML = projects.map(renderProject).join('');
  } else {
    projectsEl.innerHTML = '<div class="empty">No active projects. Approve an idea to get started.</div>';
  }

  // Render ideas
  const ideasEl = document.getElementById('ideasList');
  if (ideas.length > 0) {
    ideasEl.innerHTML = ideas.map(renderIdea).join('');
  } else {
    ideasEl.innerHTML = '<div class="empty">Monday research hasn\'t run yet.</div>';
  }

  // Render flags
  const flagsEl = document.getElementById('flagsList');
  if (flags.length > 0) {
    flagsEl.innerHTML = flags.map(renderFlag).join('');
  } else {
    flagsEl.innerHTML = '<div class="empty" style="padding: 20px;">All clear</div>';
  }

  // Render activity
  const feedEl = document.getElementById('activityFeed');
  if (activity.length > 0) {
    feedEl.innerHTML = activity.map(renderActivity).join('');
  }

  // Update timestamp
  document.getElementById('lastUpdate').textContent = `Last update: ${new Date().toLocaleTimeString()}`;
}

// Auto-refresh every 30 seconds
loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
